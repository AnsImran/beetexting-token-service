name: CI

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
# Push to main runs the full pipeline (test → build → push → deploy), UNLESS
# the push only touches docs/markdown/gitignore files.  In that case the entire
# workflow is skipped — no CI, no image build, no deployment — because none of
# those files affect the runtime image.
#
# Belt-and-braces: even if the workflow DOES run (e.g. a mixed push), the
# `.dockerignore` excludes docs/ and README.md so the build context is
# identical, layer caching hits, and `SOURCE_DATE_EPOCH=0` guarantees a
# byte-identical image digest.  `docker compose pull` on the server will then
# see no new image and leave the running container untouched.
#
# Pull requests always run the test job (cheap, gives a green checkmark).
# workflow_dispatch lets us force a manual run if we need to.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - '.env.example'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # 1. Test
  # ────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Compile Python
        run: uv run python -m compileall -q src main.py

      - name: Run tests
        # No BEETEXTING env vars here — every test either constructs Settings()
        # with explicit kwargs or injects a fake settings singleton before the
        # app is built.  Setting env vars globally breaks the
        # test_missing_required_field_rejected test because pydantic-settings
        # reads from the process environment even when _env_file=None.
        run: uv run pytest -v

  # ────────────────────────────────────────────────────────────────────────
  # 2. Build image and push to GHCR
  # ────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build and push image
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push token-service image
        uses: docker/build-push-action@v6
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/ansimran/beetexting-token-service/token-service:latest
          provenance: false
          sbom: false
          cache-from: type=registry,ref=ghcr.io/ansimran/beetexting-token-service/token-service:buildcache
          cache-to: type=registry,ref=ghcr.io/ansimran/beetexting-token-service/token-service:buildcache,mode=max

  # ────────────────────────────────────────────────────────────────────────
  # 3. Deploy to production EC2 server
  # ────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to server
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy-beetexting
      cancel-in-progress: true
    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.DEPLOY_HOST }}"     || (echo "Missing secret: DEPLOY_HOST"     && exit 1)
          test -n "${{ secrets.DEPLOY_USER }}"     || (echo "Missing secret: DEPLOY_USER"     && exit 1)
          test -n "${{ secrets.DEPLOY_GIT_PATH }}" || (echo "Missing secret: DEPLOY_GIT_PATH" && exit 1)
          test -n "${{ secrets.DEPLOY_SSH_KEY }}"  || (echo "Missing secret: DEPLOY_SSH_KEY"  && exit 1)
          test -n "${{ secrets.GHCR_USER }}"       || (echo "Missing secret: GHCR_USER"       && exit 1)
          test -n "${{ secrets.GHCR_TOKEN }}"      || (echo "Missing secret: GHCR_TOKEN"      && exit 1)

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          PORT="${{ secrets.DEPLOY_PORT }}"
          if [ -z "$PORT" ]; then PORT="22"; fi
          ssh-keyscan -p "$PORT" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull image and restart container on server
        shell: bash
        run: |
          set -euo pipefail
          PORT="${{ secrets.DEPLOY_PORT }}"
          if [ -z "$PORT" ]; then PORT="22"; fi

          DEPLOY_GIT_PATH_B64="$(printf '%s' '${{ secrets.DEPLOY_GIT_PATH }}' | base64 -w0)"
          GHCR_USER_B64="$(printf '%s' '${{ secrets.GHCR_USER }}'             | base64 -w0)"
          GHCR_TOKEN_B64="$(printf '%s' '${{ secrets.GHCR_TOKEN }}'           | base64 -w0)"

          ssh -p "$PORT" -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "DEPLOY_GIT_PATH_B64='$DEPLOY_GIT_PATH_B64' GHCR_USER_B64='$GHCR_USER_B64' GHCR_TOKEN_B64='$GHCR_TOKEN_B64' bash -s" <<'EOS'
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0

          deploy_git_path="$(printf '%s' "$DEPLOY_GIT_PATH_B64" | base64 -d)"
          ghcr_user="$(printf '%s' "$GHCR_USER_B64" | base64 -d)"
          ghcr_token="$(printf '%s' "$GHCR_TOKEN_B64" | base64 -d)"

          cd "$deploy_git_path"

          git fetch --prune origin main
          git checkout main
          git reset --hard origin/main

          echo "$ghcr_token" | docker login ghcr.io -u "$ghcr_user" --password-stdin

          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f

          echo "Waiting for service to become healthy..."
          sleep 8
          docker compose ps
          echo "--- /api/v1/ping ---"
          curl -sS --max-time 5 http://127.0.0.1:8100/api/v1/ping || true
          echo
          echo "--- /api/v1/health ---"
          curl -sS --max-time 5 http://127.0.0.1:8100/api/v1/health || true
          echo
          EOS
